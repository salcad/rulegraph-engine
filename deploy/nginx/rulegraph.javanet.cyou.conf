# Host nginx vhost for rulegraph.javanet.cyou — serves the RuleGraph UI and the
# engine's web API from a single origin. Plain nginx box (not Mail-in-a-Box).
#
# Both the UI and the API live on this one subdomain:
#   /rulegraph-api/...  ->  engine container  (127.0.0.1:8074)
#   /                   ->  UI container       (127.0.0.1:8073, static nginx)
#
# Same origin means the browser calls /rulegraph-api/ relatively, so there is no
# CORS to configure: build the UI with VITE_API_BASE_URL="" (see the root
# docker-compose.yml) and the requests stay first-party. The containers bind to
# loopback only; this vhost is the sole public entry point.
#
# WHERE THIS GOES ON THE VPS:  /etc/nginx/sites-available/rulegraph.javanet.cyou.conf
#   then symlink into /etc/nginx/sites-enabled/ and `sudo nginx -t && sudo systemctl reload nginx`.
#
# This file starts HTTP-only (port 80) on purpose. Run
#   sudo certbot --nginx -d rulegraph.javanet.cyou
# once; certbot adds the `listen 443 ssl` + certificate lines to this server and
# creates the HTTP->HTTPS redirect. Every location block below carries over unchanged.

server {
    listen 80;
    listen [::]:80;
    server_name rulegraph.javanet.cyou;

    client_max_body_size 10M;
    server_tokens off;

    # Let's Encrypt HTTP-01 challenge (harmless to keep after certbot runs).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Engine web API (Docker container, bound to 127.0.0.1:8074). The Spring app
    # serves everything under the /rulegraph-api/ prefix, so the prefix is passed
    # through unchanged.
    location ^~ /rulegraph-api/ {
        proxy_pass http://127.0.0.1:8074;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # A live report runs the pipeline (PDF ingest + optional LLM call), which
        # can take longer than the default 60s read timeout on the first request.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # UI single-page app (Docker container, bound to 127.0.0.1:8073). The
    # container's own nginx serves the static bundle and does the SPA
    # try_files fallback, so this is a plain pass-through.
    location / {
        proxy_pass http://127.0.0.1:8073;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
