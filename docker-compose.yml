# Self-contained backend stack: Neo4j plus the engine's web API. This is what you deploy to a server
# (for example a Docker VPS); the front end is deployed separately and calls this API.
#
#   docker compose up -d --build          # build and start Neo4j and the backend
#   docker compose up -d neo4j            # just Neo4j, for running the jar locally during development
#   docker compose down                   # stop (keep the Neo4j volume)
#
# Change NEO4J_AUTH / NEO4J_PASSWORD to a real secret before exposing this publicly. Set
# RULEGRAPH_CORS_ORIGINS only if the browser calls this API directly (see DEPLOY.md).
#
# Note: the repository root has its own docker-compose.yml that runs this backend together with the
# UI for a local all-in-one demo. The two share container names, so run only one stack at a time.
services:
  neo4j:
    image: neo4j:5.23-community
    container_name: rulegraph-neo4j
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build: .
    container_name: rulegraph-backend
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      RULEGRAPH_SAMPLE_DOCS: /app/sample_docs
      # Only needed for direct browser-to-backend calls (Option B in DEPLOY.md):
      RULEGRAPH_CORS_ORIGINS: "https://*.vercel.app"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
