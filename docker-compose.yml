# Backend module: Neo4j plus the engine's web API. Deploy this alongside the front-end module
# (../rulegraph-ui/docker-compose.yml); the two run as independent stacks behind the host's nginx
# vhost, which is the single public entry point. See deploy/README.md for the vhost and TLS.
#
#   docker compose up -d --build          # build and start Neo4j and the backend
#   docker compose up -d neo4j            # just Neo4j, for running the jar locally during development
#   docker compose down                   # stop (keep the Neo4j volume)
#
# All ports bind to 127.0.0.1 only, so nothing is reachable from the public internet except through
# the host nginx. Set NEO4J_PASSWORD (and optionally OPENROUTER_API_KEY / RULEGRAPH_LLM_ENABLED) in a
# .env file next to this compose before deploying. RULEGRAPH_CORS_ORIGINS matters only when the browser
# calls this API on a different origin (e.g. a local dev viewer); the deployed UI is same-origin.
services:
  neo4j:
    image: neo4j:5.23-community
    container_name: rulegraph-neo4j
    # Loopback only: the backend reaches Neo4j over the compose network; these mappings just expose
    # the browser (7474) and Bolt (7687) to the local host for development.
    ports:
      - "127.0.0.1:7474:7474"   # Neo4j browser
      - "127.0.0.1:7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password123}
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build: .
    container_name: rulegraph-backend
    # Loopback only: reached via the host nginx /rulegraph-api/ proxy, never directly from the internet.
    ports:
      - "127.0.0.1:8074:8074"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
      RULEGRAPH_SAMPLE_DOCS: /app/sample_docs
      # Allowed CORS origins for browser-to-backend calls. Includes the local Vite dev server (5173)
      # and preview (4173) for development, plus the deployed origin. The deployed UI is same-origin,
      # but the host nginx proxies to this app over plain HTTP without forwarding the scheme, so Spring
      # sees the request as http:// while the browser's Origin is https:// — a scheme mismatch that
      # makes Spring treat it as cross-origin. Listing the https origin here lets those requests through
      # (otherwise the firm-method preview POST fails with 403). Add other deployed origins as needed.
      RULEGRAPH_CORS_ORIGINS: "http://localhost:5173,http://localhost:4173,https://rulegraph.javanet.cyou"
      # OpenRouter API key for the LLM rule extractor. Export OPENROUTER_API_KEY in your shell so it
      # passes through at `docker compose up` time. When unset the app just falls back to the seed
      # extractor, so a missing key won't block boot.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RULEGRAPH_LLM_ENABLED: ${RULEGRAPH_LLM_ENABLED:-false}
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
